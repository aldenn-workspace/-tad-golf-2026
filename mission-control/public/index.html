<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mission Control – PromusVC</title>
<style>
/* ── Reset & Base ───────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f172a;--surface:#1e293b;--border:#334155;--text:#e2e8f0;
  --muted:#94a3b8;--accent:#3b82f6;--accent2:#8b5cf6;--green:#22c55e;
  --yellow:#eab308;--red:#ef4444;--orange:#f97316;
  --sidebar:240px;
}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);
     display:flex;min-height:100vh;font-size:14px;line-height:1.5}

/* ── Sidebar ────────────────────────────────────────────────────── */
#sidebar{width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border);
         display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;
         height:100vh;overflow-y:auto;z-index:100}
#sidebar .logo{padding:1.25rem 1rem;font-size:1rem;font-weight:700;color:var(--accent);
               border-bottom:1px solid var(--border);letter-spacing:.5px}
#sidebar .logo span{color:var(--muted);font-weight:400;font-size:.75rem;display:block;margin-top:2px}
nav{flex:1;padding:.5rem 0}
nav a{display:flex;align-items:center;gap:.6rem;padding:.6rem 1rem;color:var(--muted);
      text-decoration:none;border-radius:6px;margin:.1rem .5rem;transition:all .15s;font-size:.875rem}
nav a:hover{background:var(--border);color:var(--text)}
nav a.active{background:#1d4ed820;color:var(--accent);font-weight:600}
nav .section{font-size:.7rem;font-weight:600;color:#475569;padding:.75rem 1rem .25rem;
             letter-spacing:.08em;text-transform:uppercase}
#sidebar .bottom{padding:.75rem;border-top:1px solid var(--border)}
#sidebar .bottom button{width:100%;padding:.5rem;background:transparent;border:1px solid var(--border);
                        border-radius:6px;color:var(--muted);cursor:pointer;font-size:.8rem}
#sidebar .bottom button:hover{border-color:var(--red);color:var(--red)}

/* ── Main Content ───────────────────────────────────────────────── */
#main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;
        display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#topbar h1{font-size:1.125rem;font-weight:700}
#topbar .actions{display:flex;gap:.5rem}
#content{padding:1.5rem;flex:1}

/* ── Cards & Layout ─────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
           padding:1rem;text-align:center}
.stat-card .num{font-size:2rem;font-weight:700;color:var(--accent)}
.stat-card .lbl{color:var(--muted);font-size:.8rem;margin-top:.25rem}

/* ── Tables ─────────────────────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.6rem .75rem;border-bottom:1px solid var(--border);
   color:var(--muted);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.06em}
td{padding:.6rem .75rem;border-bottom:1px solid #1e2d3d;vertical-align:top}
tr:hover td{background:#1a2642}
tr:last-child td{border-bottom:none}

/* ── Badges ─────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:.15rem .5rem;border-radius:999px;font-size:.72rem;font-weight:600}
.badge-blue{background:#1d4ed820;color:#60a5fa}
.badge-green{background:#16a34a20;color:#4ade80}
.badge-yellow{background:#ca8a0420;color:#fbbf24}
.badge-red{background:#dc262620;color:#f87171}
.badge-purple{background:#7c3aed20;color:#c084fc}
.badge-gray{background:#33415520;color:#94a3b8}
.badge-orange{background:#c2410c20;color:#fb923c}

/* ── Buttons ─────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:.35rem;padding:.45rem .9rem;border:none;
     border-radius:7px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#2563eb}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{background:#16a34a}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#dc2626}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-sm{padding:.3rem .6rem;font-size:.78rem}

/* ── Forms ───────────────────────────────────────────────────────── */
.form-row{display:flex;gap:.75rem;flex-wrap:wrap;margin-bottom:.75rem}
.form-group{display:flex;flex-direction:column;gap:.3rem;flex:1;min-width:140px}
label{font-size:.78rem;color:var(--muted);font-weight:600}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:.5rem .75rem;font-size:.875rem;width:100%;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
textarea{resize:vertical;min-height:80px}

/* ── Modal ───────────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:#00000080;z-index:200;display:none;
          align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;
       padding:1.5rem;width:min(600px,95vw);max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;margin-bottom:1rem}
.modal-footer{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1rem}

/* ── Search / Filters ─────────────────────────────────────────────  */
.filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.search-input{flex:1;min-width:200px;max-width:320px}

/* ── Pipeline Kanban ─────────────────────────────────────────────── */
.kanban{display:flex;gap:1rem;overflow-x:auto;padding-bottom:.5rem}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;
            min-width:220px;flex-shrink:0}
.kanban-col .col-hdr{padding:.75rem 1rem;border-bottom:1px solid var(--border);
                     font-weight:700;font-size:.85rem;display:flex;justify-content:space-between}
.kanban-col .cards{padding:.5rem;min-height:100px;display:flex;flex-direction:column;gap:.5rem}
.k-card{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.75rem;
        cursor:pointer;transition:border-color .15s}
.k-card:hover{border-color:var(--accent)}
.k-card .kc-name{font-weight:600;font-size:.875rem}
.k-card .kc-meta{font-size:.75rem;color:var(--muted);margin-top:.25rem}

/* ── Progress bar ─────────────────────────────────────────────────── */
.prog-wrap{background:#1a2442;border-radius:999px;height:6px;overflow:hidden;margin:.25rem 0}
.prog-bar{height:100%;border-radius:999px;background:var(--accent)}

/* ── Toast ───────────────────────────────────────────────────────── */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:.5rem}
.toast{background:#1e293b;border:1px solid var(--border);border-radius:8px;padding:.75rem 1rem;
       font-size:.875rem;animation:toastIn .2s ease;max-width:320px}
.toast.ok{border-color:var(--green);color:var(--green)}
.toast.err{border-color:var(--red);color:var(--red)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ── Misc ────────────────────────────────────────────────────────── */
.empty{text-align:center;padding:3rem;color:var(--muted)}
.loading{text-align:center;padding:2rem;color:var(--muted)}
.flex{display:flex}.gap{gap:.5rem}.jcsb{justify-content:space-between}.aic{align-items:center}
.mt{margin-top:.75rem}.mb{margin-bottom:.75rem}.fw{width:100%}
.text-muted{color:var(--muted)}.text-sm{font-size:.8rem}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="logo">🚀 Mission Control<span>PromusVC Ops</span></div>
  <nav id="nav">
    <div class="section">Overview</div>
    <a href="#dashboard" class="nav-link">📊 Dashboard</a>
    <a href="#todos" class="nav-link">✅ Todos</a>
    <a href="#tasks" class="nav-link">📋 Tasks</a>

    <div class="section">Deals</div>
    <a href="#pipeline" class="nav-link">💼 Pipeline</a>
    <a href="#incoming" class="nav-link">📨 Incoming Deals</a>
    <a href="#pv5" class="nav-link">💰 PV5 LPs</a>

    <div class="section">CRM</div>
    <a href="#companies" class="nav-link">🏢 Companies</a>
    <a href="#people" class="nav-link">👥 People</a>

    <div class="section">Operations</div>
    <a href="#travel" class="nav-link">✈️ Travel</a>
    <a href="#calendar" class="nav-link">📅 Calendar</a>
    <a href="#legal" class="nav-link">⚖️ Legal</a>
    <a href="#research" class="nav-link">🔬 Research</a>

    <div class="section">Knowledge</div>
    <a href="#podcasts" class="nav-link">🎙️ Podcasts</a>
    <a href="#articles" class="nav-link">📰 Articles</a>
    <a href="#riley" class="nav-link">📝 Riley Notes</a>
    <a href="#roi" class="nav-link">📈 ROI Log</a>

    <div class="section">Team</div>
    <a href="#team" class="nav-link">👤 Team</a>
  </nav>
  <div class="bottom">
    <button onclick="logout()">Sign Out</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="topbar">
    <h1 id="page-title">Dashboard</h1>
    <div class="actions" id="topbar-actions"></div>
  </div>
  <div id="content"><div class="loading">Loading...</div></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-box">
    <h2 id="modal-title"></h2>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Utilities ─────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || r.statusText);
  return data;
}
const get = (p, q) => api('GET', p + (q ? '?' + new URLSearchParams(q) : ''));
const post = (p, b) => api('POST', p, b);
const put  = (p, b) => api('PUT',  p, b);
const del  = (p)    => api('DELETE', p);

function toast(msg, type='ok') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toast').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function showErr(e) { toast(e.message || String(e), 'err'); }

function badge(text, color='gray') {
  const map = { sourcing:'blue', 'initial screening':'blue', diligence:'purple',
    committed:'green', passed:'gray', 'soft circle':'yellow', new:'blue',
    promoted:'green', todo:'blue', 'in-progress':'yellow', done:'green', blocked:'red',
    open:'blue', closed:'green', planned:'blue', active:'green', completed:'green',
    urgent:'red', high:'orange', normal:'blue', low:'gray' };
  const c = map[String(text).toLowerCase()] || color;
  return `<span class="badge badge-${c}">${text || '—'}</span>`;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}
function fmtMoney(n) {
  if (!n) return '—';
  return new Intl.NumberFormat('en-US', { style:'currency', currency:'USD', maximumFractionDigits:0 }).format(n);
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Modal ─────────────────────────────────────────────────────────
function openModal(title, body, footer='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer + `<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>`;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }

// ── Router ────────────────────────────────────────────────────────
const PAGES = {};
function route(hash) {
  const page = hash.replace('#','') || 'dashboard';
  document.querySelectorAll('.nav-link').forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#'+page);
  });
  const titles = { dashboard:'Dashboard', todos:'Todos', tasks:'Tasks', pipeline:'Pipeline',
    incoming:'Incoming Deals', pv5:'PV5 LPs', companies:'Companies', people:'People',
    travel:'Travel', calendar:'Calendar', legal:'Legal Reviews', research:'Research',
    podcasts:'Podcasts', articles:'Articles', riley:'Riley Notes', roi:'ROI Log', team:'Team' };
  document.getElementById('page-title').textContent = titles[page] || page;
  document.getElementById('topbar-actions').innerHTML = '';
  if (PAGES[page]) PAGES[page]();
  else document.getElementById('content').innerHTML = `<div class="empty">Page not found: ${page}</div>`;
}
window.addEventListener('hashchange', () => route(location.hash));

// ── Dashboard ─────────────────────────────────────────────────────
PAGES.dashboard = async () => {
  document.getElementById('content').innerHTML = '<div class="loading">Loading...</div>';
  try {
    const stats = await get('/system/stats');
    const c = stats.counts;
    document.getElementById('content').innerHTML = `
    <div class="grid4" style="margin-bottom:1.5rem">
      <div class="stat-card"><div class="num">${c.promus_deals||0}</div><div class="lbl">Pipeline Deals</div></div>
      <div class="stat-card"><div class="num">${c.incoming_deals||0}</div><div class="lbl">Incoming Deals</div></div>
      <div class="stat-card"><div class="num">${c.pv5_lps||0}</div><div class="lbl">PV5 LPs</div></div>
      <div class="stat-card"><div class="num">${c.companies||0}</div><div class="lbl">Companies</div></div>
    </div>
    <div class="grid4" style="margin-bottom:1.5rem">
      <div class="stat-card"><div class="num">${c.todos||0}</div><div class="lbl">Todos</div></div>
      <div class="stat-card"><div class="num">${c.tasks||0}</div><div class="lbl">Tasks</div></div>
      <div class="stat-card"><div class="num">${c.people||0}</div><div class="lbl">People</div></div>
      <div class="stat-card"><div class="num">${c.travel_trips||0}</div><div class="lbl">Trips</div></div>
    </div>
    <div class="grid2">
      <div class="card">
        <h3 style="margin-bottom:.75rem">Quick Links</h3>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem">
          <a href="#pipeline" class="btn btn-ghost">💼 Pipeline</a>
          <a href="#incoming" class="btn btn-ghost">📨 Incoming</a>
          <a href="#pv5" class="btn btn-ghost">💰 PV5 LPs</a>
          <a href="#todos" class="btn btn-ghost">✅ Todos</a>
          <a href="#travel" class="btn btn-ghost">✈️ Travel</a>
          <a href="#companies" class="btn btn-ghost">🏢 Companies</a>
        </div>
      </div>
      <div class="card">
        <h3 style="margin-bottom:.75rem">System</h3>
        <div class="text-muted text-sm">
          <div>Uptime: ${Math.round(stats.uptime/60)} min</div>
          <div>DB: ${Object.values(c).reduce((a,b)=>a+b,0)} total rows</div>
          <div>Last refresh: ${new Date().toLocaleTimeString()}</div>
        </div>
      </div>
    </div>`;
  } catch(e) { showErr(e); }
};

// ── Todos ─────────────────────────────────────────────────────────
PAGES.todos = async () => {
  const listFilter = document.querySelector('#todo-list-filter')?.value || '';
  const statusFilter = 'open';
  document.getElementById('topbar-actions').innerHTML = `
    <button class="btn btn-primary" onclick="addTodo()">+ Add Todo</button>`;
  document.getElementById('content').innerHTML = `
    <div class="filters">
      <select id="todo-list-filter" class="btn btn-ghost" onchange="PAGES.todos()">
        <option value="">All Lists</option>
        <option value="personal">Personal</option>
        <option value="work">Work</option>
        <option value="promus">Promus</option>
        <option value="pv5">PV5</option>
      </select>
      <select id="todo-status-filter" class="btn btn-ghost" onchange="PAGES.todos()">
        <option value="open">Open</option>
        <option value="">All</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div class="loading" id="todo-list">Loading...</div>`;
  try {
    const q = {};
    const lf = document.getElementById('todo-list-filter')?.value;
    const sf = document.getElementById('todo-status-filter')?.value;
    if (lf) q.list = lf;
    if (sf) q.status = sf;
    const rows = await get('/todos', Object.keys(q).length ? q : null);
    if (!rows.length) { document.getElementById('todo-list').innerHTML = '<div class="empty">No todos found</div>'; return; }
    document.getElementById('todo-list').innerHTML = rows.map(t => `
      <div class="card" style="padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem">
        <input type="checkbox" ${t.status==='closed'?'checked':''} style="width:16px;height:16px;cursor:pointer"
          onchange="toggleTodo(${t.id}, this.checked)">
        <div style="flex:1;${t.status==='closed'?'opacity:.5;text-decoration:line-through':''}">
          <div style="font-weight:600">${esc(t.text)}</div>
          ${t.notes ? `<div class="text-muted text-sm">${esc(t.notes)}</div>` : ''}
          <div class="text-sm" style="margin-top:.2rem">
            ${badge(t.priority)} ${badge(t.list,'purple')}
            ${t.due_date ? `<span class="text-muted">Due: ${fmtDate(t.due_date)}</span>` : ''}
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="editTodo(${t.id})">Edit</button>
        <button class="btn btn-ghost btn-sm" onclick="deleteTodo(${t.id})" style="color:var(--red)">✕</button>
      </div>`).join('');
  } catch(e) { showErr(e); }
};
window.toggleTodo = async (id, closed) => {
  try { await put(`/todos/${id}`, { status: closed ? 'closed' : 'open' }); PAGES.todos(); }
  catch(e) { showErr(e); }
};
window.addTodo = () => openModal('Add Todo', `
  <div class="form-row"><div class="form-group fw"><label>Text</label><input id="t-text" autofocus></div></div>
  <div class="form-row">
    <div class="form-group"><label>List</label><select id="t-list">
      <option>personal</option><option>work</option><option>promus</option><option>pv5</option>
    </select></div>
    <div class="form-group"><label>Priority</label><select id="t-pri">
      <option>normal</option><option>high</option><option>urgent</option><option>low</option>
    </select></div>
    <div class="form-group"><label>Due Date</label><input id="t-due" type="date"></div>
  </div>
  <div class="form-row"><div class="form-group fw"><label>Notes</label><textarea id="t-notes"></textarea></div></div>`,
  `<button class="btn btn-primary" onclick="saveTodo()">Save</button>`);
window.saveTodo = async () => {
  const text = document.getElementById('t-text').value.trim();
  if (!text) return toast('Text required','err');
  try {
    await post('/todos', { text, list: document.getElementById('t-list').value,
      priority: document.getElementById('t-pri').value,
      due_date: document.getElementById('t-due').value,
      notes: document.getElementById('t-notes').value });
    closeModal(); toast('Todo added'); PAGES.todos();
  } catch(e) { showErr(e); }
};
window.deleteTodo = async (id) => {
  if (!confirm('Delete this todo?')) return;
  try { await del(`/todos/${id}`); toast('Deleted'); PAGES.todos(); } catch(e) { showErr(e); }
};
window.editTodo = async (id) => {
  const rows = await get('/todos');
  const t = rows.find(x => x.id === id);
  if (!t) return;
  openModal('Edit Todo', `
    <div class="form-row"><div class="form-group fw"><label>Text</label><input id="t-text" value="${esc(t.text)}"></div></div>
    <div class="form-row">
      <div class="form-group"><label>List</label><select id="t-list">
        ${['personal','work','promus','pv5'].map(v=>`<option ${t.list===v?'selected':''}>${v}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Priority</label><select id="t-pri">
        ${['normal','high','urgent','low'].map(v=>`<option ${t.priority===v?'selected':''}>${v}</option>`).join('')}
      </select></div>
      <div class="form-group"><label>Due Date</label><input id="t-due" type="date" value="${t.due_date||''}"></div>
    </div>
    <div class="form-row"><div class="form-group fw"><label>Notes</label><textarea id="t-notes">${esc(t.notes||'')}</textarea></div></div>`,
    `<button class="btn btn-primary" onclick="updateTodo(${id})">Update</button>`);
};
window.updateTodo = async (id) => {
  try {
    await put(`/todos/${id}`, { text: document.getElementById('t-text').value,
      list: document.getElementById('t-list').value, priority: document.getElementById('t-pri').value,
      due_date: document.getElementById('t-due').value, notes: document.getElementById('t-notes').value });
    closeModal(); toast('Updated'); PAGES.todos();
  } catch(e) { showErr(e); }
};

// ── Tasks ─────────────────────────────────────────────────────────
PAGES.tasks = async () => {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="addTask()">+ Add Task</button>`;
  document.getElementById('content').innerHTML = `
    <div class="filters">
      <select id="task-status" class="btn btn-ghost" onchange="PAGES.tasks()">
        <option value="todo">Todo</option><option value="">All</option>
        <option value="in-progress">In Progress</option><option value="done">Done</option>
      </select>
    </div>
    <div class="loading" id="task-list">Loading...</div>`;
  try {

PAGES.people = async () => {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="addPerson()">+ Add Person</button>`;
  document.getElementById('content').innerHTML = `
    <div class="filters"><input class="search-input" id="ppl-search" placeholder="Search people..."></div>
    <div class="loading" id="ppl-list">Loading...</div>`;
  try {
    const rows = await get('/people');
    const search = () => {
      const s = document.getElementById('ppl-search')?.value?.toLowerCase()||'';
      const data = rows.filter(p => !s || p.name.toLowerCase().includes(s) || (p.company||'').toLowerCase().includes(s));
      document.getElementById('ppl-list').innerHTML = data.length ? `<div class="card tbl-wrap"><table>
        <tr><th>Name</th><th>Company</th><th>Role</th><th>Email</th><th>Relationship</th><th></th></tr>
        ${data.map(p=>`<tr>
          <td><strong>${esc(p.name)}</strong></td>
          <td>${esc(p.company||'—')}</td><td class="text-muted">${esc(p.role||'—')}</td>
          <td><a href="mailto:${esc(p.email)}" style="color:var(--accent)">${esc(p.email||'—')}</a></td>
          <td>${badge(p.relationship,'blue')}</td>
          <td><button class="btn btn-ghost btn-sm" onclick="deletePerson(${p.id})" style="color:var(--red)">✕</button></td>
        </tr>`).join('')}
      </table></div>` : '<div class="empty">No people found</div>';
    };
    document.getElementById('ppl-search').addEventListener('input', search);
    search();
  } catch(e) { showErr(e); }
};

        <td>${a.url?`<a href="${esc(a.url)}" target="_blank" style="color:var(--accent)">${esc(a.source||a.url.substring(0,30))}</a>`:esc(a.source||'—')}</td>
        <td>${badge(a.status,'blue')}</td>
        <td>${fmtDate(a.date_published||a.date_added)}</td>
        <td><button class="btn btn-ghost btn-sm" onclick="deleteArticle(${a.id})" style="color:var(--red)">✕</button></td>
      </tr>`).join('')}
    </table></div>` : '<div class="empty">No articles</div>';
  } catch(e) { showErr(e); }
};
window.addArticle = () => openModal('Add Article', `
  <div class="form-row"><div class="form-group fw"><label>Title *</label><input id="ar-title" autofocus></div></div>
  <div class="form-row">
    <div class="form-group"><label>Author</label><input id="ar-author"></div>
    <div class="form-group"><label>Source</label><input id="ar-source"></div>
    <div class="form-group"><label>URL</label><input id="ar-url" type="url"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Status</label><select id="ar-status">
      <option>saved</option><option>read</option><option>archived</option>
    </select></div>
    <div class="form-group"><label>Tags</label><input id="ar-tags" placeholder="vc, ai, fintech..."></div>
  </div>
  <div class="form-row"><div class="form-group fw"><label>Mike Notes</label><textarea id="ar-notes"></textarea></div></div>`,
  `<button class="btn btn-primary" onclick="saveArticle()">Save</button>`);
window.saveArticle = async () => {
  const title = document.getElementById('ar-title').value.trim();
  if (!title) return toast('Title required','err');
  try {
    await post('/articles', { title, author: document.getElementById('ar-author').value,
      source: document.getElementById('ar-source').value, url: document.getElementById('ar-url').value,
      status: document.getElementById('ar-status').value, tags: document.getElementById('ar-tags').value,
      mike_notes: document.getElementById('ar-notes').value });
    closeModal(); toast('Article added'); PAGES.articles();
  } catch(e) { showErr(e); }
};
window.deleteArticle = async (id) => {
  if (!confirm('Delete?')) return;
  try { await del(`/articles/${id}`); toast('Deleted'); PAGES.articles(); } catch(e) { showErr(e); }
};

// ── Riley Notes ───────────────────────────────────────────────────
PAGES.riley = async () => {
  document.getElementById('content').innerHTML = '<div class="loading" id="riley-list">Loading...</div>';
  try {
    const rows = await get('/riley');
    document.getElementById('riley-list').innerHTML = rows.length ? rows.map(r => `
      <div class="card" onclick="viewRiley('${esc(r.id)}')" style="cursor:pointer">
        <div class="flex aic jcsb">
          <div>
            <div style="font-weight:700">${esc(r.title||'Meeting Notes')}</div>
            <div class="text-muted text-sm">${fmtDate(r.meeting_date)} · ${esc(r.attendees||'')}</div>
            ${r.companies ? `<div class="text-sm mt">🏢 ${esc(r.companies)}</div>` : ''}
          </div>
          <div class="text-muted text-sm">${fmtDate(r.processed_at)}</div>
        </div>
      </div>`).join('') : '<div class="empty">No meeting notes</div>';
  } catch(e) { showErr(e); }
};
window.viewRiley = async (id) => {
  try {
    const r = await get(`/riley/${id}`);
    openModal(r.title||'Meeting Notes', `
      <div class="text-muted text-sm mb">📅 ${fmtDate(r.meeting_date)} · ${esc(r.attendees||'')}</div>
      ${r.summary ? `<div style="white-space:pre-wrap;font-size:.875rem;margin-bottom:1rem">${esc(r.summary)}</div>` : ''}
      ${r.action_items ? `<div><strong>Action Items:</strong><div style="white-space:pre-wrap;font-size:.85rem;color:var(--muted)">${esc(r.action_items)}</div></div>` : ''}`);
  } catch(e) { showErr(e); }
};

// ── ROI Log ───────────────────────────────────────────────────────
PAGES.roi = async () => {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="addRoi()">+ Log ROI</button>`;
  document.getElementById('content').innerHTML = '<div class="loading" id="roi-list">Loading...</div>';
  try {
    const { rows, totals } = await get('/roi');
    document.getElementById('roi-list').innerHTML = `
      <div class="grid3" style="margin-bottom:1rem">
        <div class="stat-card"><div class="num">${Math.round((totals.mins||0)/60)}h</div><div class="lbl">Hours Saved</div></div>
        <div class="stat-card"><div class="num">${fmtMoney(totals.value||0)}</div><div class="lbl">Value Created</div></div>
        <div class="stat-card"><div class="num">${fmtMoney(totals.cost||0)}</div><div class="lbl">AI Cost</div></div>
      </div>
      ${rows.length ? `<div class="card tbl-wrap"><table>
        <tr><th>Date</th><th>Agent</th><th>Category</th><th>Description</th><th>Min Saved</th><th>Value</th></tr>
        ${rows.map(r=>`<tr>
          <td>${fmtDate(r.date)}</td>
          <td>${badge(r.agent,'purple')}</td>
          <td>${esc(r.category)}</td>
          <td>${esc(r.description)}</td>
          <td>${r.mins_saved}</td>
          <td>${fmtMoney(r.value_usd)}</td>
        </tr>`).join('')}
      </table></div>` : '<div class="empty">No ROI entries yet</div>'}`;
  } catch(e) { showErr(e); }
};
window.addRoi = () => openModal('Log ROI', `
  <div class="form-row">
    <div class="form-group"><label>Agent</label><input id="roi-agent" value="Alden"></div>
    <div class="form-group"><label>Category</label><input id="roi-cat" value="General"></div>
  </div>
  <div class="form-row"><div class="form-group fw"><label>Description *</label><input id="roi-desc" autofocus></div></div>
  <div class="form-row">
    <div class="form-group"><label>Minutes Saved</label><input id="roi-mins" type="number" value="0"></div>
    <div class="form-group"><label>Value ($)</label><input id="roi-val" type="number" value="0"></div>
    <div class="form-group"><label>Token Cost ($)</label><input id="roi-cost" type="number" value="0" step="0.001"></div>
  </div>`,
  `<button class="btn btn-primary" onclick="saveRoi()">Save</button>`);
window.saveRoi = async () => {
  const description = document.getElementById('roi-desc').value.trim();
  if (!description) return toast('Description required','err');
  try {
    await post('/roi', { agent: document.getElementById('roi-agent').value,
      category: document.getElementById('roi-cat').value, description,
      mins_saved: +document.getElementById('roi-mins').value,
      value_usd: +document.getElementById('roi-val').value,
      token_cost_usd: +document.getElementById('roi-cost').value });
    closeModal(); toast('Logged'); PAGES.roi();
  } catch(e) { showErr(e); }
};

// ── Team ──────────────────────────────────────────────────────────
PAGES.team = async () => {
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="addTeamMember()">+ Add Member</button>`;
  document.getElementById('content').innerHTML = '<div class="loading" id="team-list">Loading...</div>';
  try {
    const rows = await get('/team');
    document.getElementById('team-list').innerHTML = rows.length ? `<div class="grid3">
      ${rows.map(m=>`<div class="card">
        <div style="font-weight:700;font-size:1rem">${esc(m.name)}</div>
        <div class="text-muted text-sm">@${esc(m.handle)} · ${esc(m.role||'')}</div>
        <div style="margin-top:.5rem">${badge(m.status)}</div>
        <div style="margin-top:.5rem">
          <div class="prog-wrap"><div class="prog-bar" style="width:${m.capacity_pct||0}%"></div></div>
          <div class="text-muted text-sm">${m.capacity_pct}% capacity</div>
        </div>
        ${m.focus ? `<div class="text-sm mt">Focus: ${esc(m.focus)}</div>` : ''}
      </div>`).join('')}
    </div>` : '<div class="empty">No team members</div>';
  } catch(e) { showErr(e); }
};
window.addTeamMember = () => openModal('Add Team Member', `
  <div class="form-row">
    <div class="form-group"><label>Name *</label><input id="tm-name" autofocus></div>
    <div class="form-group"><label>Handle *</label><input id="tm-handle" placeholder="@handle"></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label>Role</label><input id="tm-role"></div>
    <div class="form-group"><label>Focus</label><input id="tm-focus"></div>
    <div class="form-group"><label>Capacity %</label><input id="tm-cap" type="number" value="100" min="0" max="100"></div>
  </div>`,
  `<button class="btn btn-primary" onclick="saveTeamMember()">Save</button>`);
window.saveTeamMember = async () => {
  const name = document.getElementById('tm-name').value.trim();
  const handle = document.getElementById('tm-handle').value.trim();
  if (!name||!handle) return toast('Name and handle required','err');
  try {
    await post('/team', { name, handle: handle.replace('@',''), role: document.getElementById('tm-role').value,
      focus: document.getElementById('tm-focus').value, capacity_pct: +document.getElementById('tm-cap').value });
    closeModal(); toast('Team member added'); PAGES.team();
  } catch(e) { showErr(e); }
};

// ── Auth ──────────────────────────────────────────────────────────
async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login';
}

// ── Init ──────────────────────────────────────────────────────────
route(location.hash || '#dashboard');
</script>
