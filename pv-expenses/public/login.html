<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PV Expenses">
<meta name="theme-color" content="#7c6ff7">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>PV Expenses — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d14;--surface:#16161f;--surface2:#1e1e2a;--border:rgba(255,255,255,.08);--accent:#7c6ff7;--text:#e8e8f0;--text-dim:#9090a8;--red:#f87171}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:400px}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:22px;font-weight:800;margin-bottom:4px}
.logo p{font-size:13px;color:var(--text-dim)}
label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text-dim);margin-bottom:6px;margin-top:16px}
input{width:100%;padding:11px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:15px}
input:focus{outline:none;border-color:var(--accent)}
button{width:100%;margin-top:20px;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:background .14s}
button:hover{background:#6a5de6}
.error{margin-top:14px;padding:10px 14px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;font-size:13px;color:var(--red);display:none}
.hint{margin-top:20px;padding:12px 14px;background:var(--surface2);border-radius:8px;font-size:12.5px;color:var(--text-dim);line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>💼 PV Expenses</h1>
    <p>Promus Ventures</p>
  </div>
  <form onsubmit="login(event)">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" autofocus>
    <div class="error" id="error">Invalid password or account not active.</div>
    <button type="submit" id="btn">Sign In</button>
  </form>
  <div class="hint">Enter your personal password to access your expense account. Contact Mike if you need yours.</div>
</div>
<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  const pwd = document.getElementById('password').value;
  btn.textContent = 'Signing in…';
  btn.disabled = true;
  err.style.display = 'none';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    if (res.ok) {
      window.location = '/';
    } else {
      err.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  } catch(ex) {
    err.textContent = 'Connection error. Try again.';
    err.style.display = 'block';
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
